{% extends 'base.html' %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
<div class="card shadow">
      <div class="card-body">
            <h2 class="card-title">{{ post.title }}</h2>
            <hr>
            <p class="card-text">{{ post.content }}</p>

            <a href="/blog/" class="btn btn-secondary mt-3">
                  Back to Blog
            </a>
      </div>
</div>
{% endblock %}
